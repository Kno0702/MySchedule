<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>24hサークルカレンダー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 共通ヘッダー -->
    <header class="app-header">
        <button id="back-btn" class="header-btn">← 戻る</button>
        <h1 id="header-title">24hサークルカレンダー</h1>
        <div style="width: 44px;"></div> <!-- 右側のバランス用スペース -->
    </header>

    <!-- アプリ全体のコンテナ -->
    <main class="app-container" id="app-main" data-view="calendar">
        
        <!-- 1. 月間カレンダー画面 -->
        <section id="view-calendar" class="app-view">
            <div class="calendar-controls">
                <button id="prev-month" type="button">◀</button>
                <h2 id="current-month-year">----年 --月</h2>
                <button id="next-month" type="button">▶</button>
            </div>
            <div class="calendar-weekdays">
                <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </section>

        <!-- 2. スケジュール一覧画面（1日の詳細） -->
        <section id="view-day-detail" class="app-view">
            <div class="day-header">
                <h2 id="selected-date-label">--月--日 (ー)</h2>
                <!-- スケジュール名保存フォーム ＋ フォルダボタン -->
                <div class="routine-save-box">
                    <input type="text" id="schedule-name-input" placeholder="この日の名前（例: 出張、休日）">
                    <button id="save-schedule-name-btn" type="button">保存</button>
                    <button id="open-folder-btn" type="button" title="保存済みスケジュールを呼び出す">参照</button>
                </div>
            </div>

            <!-- 24時間円形スケジュール (SVG) -->
            <div class="circle-wrapper">
                <svg id="schedule-circle" viewBox="0 0 240 240">
                    <!-- 背景の円 -->
                    <circle cx="120" cy="120" r="80" class="circle-bg" />
                    <!-- タップ反応レイヤー -->
                    <g id="circle-tap-zones-group"></g>
                    <!-- スケジュール描画エリア -->
                    <g id="circle-arcs-group"></g>
                    <!-- 時間数字レイヤー -->
                    <g id="circle-grid-group"></g>
                </svg>
            </div>

            <!-- タイムライン風の簡易リスト表示 -->
            <div class="task-list-container">
                <h3>本日の予定一覧</h3>
                <ul id="task-list"></ul>
            </div>

            <!-- 固定配置の「＋」ボタン -->
            <button id="fab-add-btn" class="fab-btn" type="button">+</button>
        </section>

        <!-- 3. スケジュール入力画面 -->
        <section id="view-input" class="app-view">
            <h2 class="view-title" id="input-view-title">予定の登録</h2>
            <form id="schedule-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="event-title">予定名</label>
                    <input type="text" id="event-title" required placeholder="例: ミーティング、睡眠">
                </div>

                <div class="form-row-vertical">
                    <!-- 開始時刻グループ -->
                    <div class="form-group">
                        <label for="event-start">開始時刻 (入力例: 0930)</label>
                        <input type="text" id="event-start" required inputmode="numeric" placeholder="09:00" maxlength="5">
                        <div class="minute-picker-label">クイック分選択 (5分刻み)</div>
                        <div id="start-min-picker" class="minute-picker-container"></div>
                    </div>
                    
                    <!-- 終了時刻グループ -->
                    <div class="form-group">
                        <label for="event-end">終了時刻 (入力例: 1000)</label>
                        <input type="text" id="event-end" required inputmode="numeric" placeholder="10:00" maxlength="5">
                        <div class="minute-picker-label">クイック分選択 (5分刻み)</div>
                        <div id="end-min-picker" class="minute-picker-container"></div>
                    </div>
                </div>

                <!-- 予定の長さ表示 -->
                <div class="duration-display">
                    予定の長さ: <span id="duration-text">1時間 0分</span>
                </div>

                <!-- カラーパレット選択 -->
                <div class="form-group">
                    <label>カラー</label>
                    <div class="color-palette">
                        <button type="button" class="color-chip active" style="background-color: #ff5e57;" data-color="#ff5e57"></button>
                        <button type="button" class="color-chip" style="background-color: #c97586;" data-color="#c97586"></button>
                        <button type="button" class="color-chip" style="background-color: #ffc048;" data-color="#ffc048"></button>
                        <button type="button" class="color-chip" style="background-color: #a8c97f;" data-color="#a8c97f"></button>
                        <button type="button" class="color-chip" style="background-color: #a0d8ef;" data-color="#a0d8ef"></button>
                        <button type="button" class="color-chip" style="background-color: #a59aca;" data-color="#a59aca"></button>
                    </div>
                </div>

                <button type="submit" id="submit-event-btn" class="primary-btn">登録する</button>
            </form>
        </section>

    </main>

    <!-- 呼び出しモーダルUI -->
    <div id="routine-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>スケジュールを呼び出す</h3>
                <button id="close-modal-btn" class="modal-close-x">&times;</button>
            </div>
            <div class="modal-body">
                <p class="modal-desc">保存済みのルーティンを選択して、現在の日付に上書きコピーします。</p>
                <ul id="routine-list" class="routine-list">
                    <!-- JSで動的に生成 -->
                </ul>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
