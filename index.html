<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>24hサークルカレンダー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 共通ヘッダー -->
    <header class="app-header">
        <button id="back-btn" class="header-btn">← 戻る</button>
        <h1 id="header-title">24hサークルカレンダー</h1>
        <div style="width: 44px;"></div> <!-- 右側のバランス用スペース -->
    </header>

    <!-- アプリ全体のコンテナ。data-view属性の値によって、表示する子セクションをCSSで制御します -->
    <main class="app-container" id="app-main" data-view="calendar">
        
        <!-- 1. 月間カレンダー画面 -->
        <section id="view-calendar" class="app-view">
            <div class="calendar-controls">
                <button id="prev-month" type="button">◀</button>
                <h2 id="current-month-year">----年 --月</h2>
                <button id="next-month" type="button">▶</button>
            </div>
            <div class="calendar-weekdays">
                <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </section>

        <!-- 2. スケジュール一覧画面（1日の詳細） -->
        <section id="view-day-detail" class="app-view">
            <div class="day-header">
                <h2 id="selected-date-label">--月--日 (ー)</h2>
                <!-- スケジュール名保存フォーム -->
                <div class="routine-save-box">
                    <input type="text" id="schedule-name-input" placeholder="この日の名前（例: 出張、休日）">
                    <button id="save-schedule-name-btn" type="button">保存</button>
                </div>
            </div>

            <!-- 24時間円形スケジュール (SVG) -->
            <div class="circle-wrapper">
                <svg id="schedule-circle" viewBox="0 0 200 200">
                    <!-- 背景の円 -->
                    <circle cx="100" cy="100" r="80" class="circle-bg" />
                    <!-- 24時間の目盛り線やテキストはJSで動的に追加 -->
                    <g id="circle-grid-group"></g>
                    <!-- スケジュール円弧の描画エリア -->
                    <g id="circle-arcs-group"></g>
                    <!-- 中央のタップ領域 -->
                    <circle cx="100" cy="100" r="50" class="circle-center-tap" id="circle-center-btn" />
                    <text x="100" y="105" class="circle-center-text" id="circle-center-btn-text">タップして追加</text>
                </svg>
            </div>

            <!-- タイムライン風の簡易リスト表示 -->
            <div class="task-list-container">
                <h3>本日の予定一覧</h3>
                <ul id="task-list"></ul>
            </div>

            <!-- 固定配置の「＋」ボタン -->
            <button id="fab-add-btn" class="fab-btn" type="button">+</button>
        </section>

        <!-- 3. スケジュール入力画面 -->
        <section id="view-input" class="app-view">
            <h2 class="view-title">予定の登録</h2>
            <form id="schedule-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="event-title">予定名</label>
                    <input type="text" id="event-title" required placeholder="例: ミーティング、睡眠">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="event-start">開始時刻</label>
                        <input type="time" id="event-start" required value="09:00">
                    </div>
                    <div class="form-group">
                        <label for="event-end">終了時刻</label>
                        <input type="time" id="event-end" required value="10:00">
                    </div>
                </div>

                <!-- 自動計算される予定の長さ表示 -->
                <div class="duration-display">
                    予定の長さ: <span id="duration-text">1時間 0分</span>
                </div>

                <!-- カラーパレット選択 -->
                <div class="form-group">
                    <label>カラー</label>
                    <div class="color-palette">
                        <button type="button" class="color-chip active" style="background-color: #ff5e57;" data-color="#ff5e57"></button>
                        <button type="button" class="color-chip" style="background-color: #ffc048;" data-color="#ffc048"></button>
                        <button type="button" class="color-chip" style="background-color: #1dd1a1;" data-color="#1dd1a1"></button>
                        <button type="button" class="color-chip" style="background-color: #54a0ff;" data-color="#54a0ff"></button>
                        <button type="button" class="color-chip" style="background-color: #5f27cd;" data-color="#5f27cd"></button>
                    </div>
                </div>

                <button type="submit" id="submit-event-btn" class="primary-btn">登録する</button>
            </form>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
