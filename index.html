<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月間カレンダー</title>
    <link rel="stylesheet" href="calendar.css">
</head>
<body>

<div class="container">
    <div class="calendar-header">
        <button class="nav-btn" onclick="changeMonth(-1)">&lt;</button>
        <h2 id="current-month-year">2026年 6月</h2>
        <button class="nav-btn" onclick="changeMonth(1)">&gt;</button>
    </div>

    <div class="calendar-grid">
        <div class="weekday sun">日</div>
        <div class="weekday">月</div>
        <div class="weekday">火</div>
        <div class="weekday">水</div>
        <div class="weekday">木</div>
        <div class="weekday">金</div>
        <div class="weekday sat">土</div>
    </div>

    <div id="calendar-days" class="calendar-grid-days"></div>
</div>

<script src="calendar.js"></script>
</body>
</html>
