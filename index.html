<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1日スケジュール - 円形管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2 id="date-title">6月30日のスケジュール</h2>
    <div class="header-actions">
        <button class="btn btn-success" onclick="saveAsTemplate()">「月曜日」として保存</button>
    </div>
    
    <div class="canvas-container">
        <svg id="schedule-clock" viewBox="0 0 200 200" onclick="handleClockClick(event)">
            <circle cx="100" cy="100" r="80" fill="none" stroke="#ccc" stroke-width="2"/>
            <g id="plans-group"></g>
            <g id="ticks-group"></g>
        </svg>
    </div>

    <div class="footer-actions">
        <button class="btn btn-secondary" onclick="location.href='index.html'">カレンダーに戻る</button>
    </div>
</div>

<div id="overlay" onclick="closeModal()"></div>
<div id="modal">
    <h3>予定の入力</h3>
    
    <div class="form-group">
        <label for="plan-title">予定名</label>
        <input type="text" id="plan-title" value="運動">
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label for="start-hour">開始 (時)</label>
            <input type="number" id="start-hour" min="0" max="23">
        </div>
        <div class="form-group">
            <label for="start-minute">開始 (分)</label>
            <input type="number" id="start-minute" min="0" max="59" value="0">
        </div>
    </div>
    
    <div class="form-group">
        <label>予定の長さ</label>
        <div class="duration-buttons">
            <button type="button" class="btn btn-time" onclick="setDuration(15)">15分</button>
            <button type="button" class="btn btn-time" onclick="setDuration(30)">30分</button>
            <button type="button" class="btn btn-time" onclick="setDuration(45)">45分</button>
            <button type="button" class="btn btn-time" onclick="setDuration(60)">60分</button>
        </div>
        <input type="hidden" id="plan-duration" value="15">
    </div>
    
    <div class="form-group">
        <label for="plan-color">表示色</label>
        <select id="plan-color">
            <option value="#FFFF00">黄色（運動など）</option>
            <option value="#FFC0CB">ピンク（プライベート）</option>
            <option value="#87CEEB">水色（仕事・勉強）</option>
            <option value="#98FB98">薄緑（休憩など）</option>
        </select>
    </div>
    
    <div class="modal-buttons">
        <button class="btn btn-primary" onclick="addPlan()">予定を追加</button>
        <button class="btn btn-danger" onclick="closeModal()">キャンセル</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
