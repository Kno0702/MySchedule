<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>24hサークルカレンダー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <button id="back-btn" class="header-btn">← 戻る</button>
        <h1 id="header-title">24hサークルカレンダー</h1>
        <div style="width: 44px;"></div> </header>

    <main class="app-container" id="app-main" data-view="calendar">
        
        <section id="view-calendar" class="app-view">
            <div class="calendar-controls">
                <button id="prev-month" type="button">◀</button>
                <h2 id="current-month-year">----年 --月</h2>
                <button id="next-month" type="button">▶</button>
            </div>
            <div class="calendar-weekdays">
                <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </section>

        <section id="view-day-detail" class="app-view">
            <div class="day-header">
                <h2 id="selected-date-label">--月--日 (ー)</h2>
                <div class="routine-save-box">
                    <input type="text" id="schedule-name-input" placeholder="この日の名前（例: 出張、休日）">
                    <button id="save-schedule-name-btn" type="button">保存</button>
                </div>
            </div>

            <div class="circle-wrapper">
                <svg id="schedule-circle" viewBox="0 0 240 240">
                    <circle cx="120" cy="120" r="80" class="circle-bg" />
                    
                    <g id="circle-tap-zones-group"></g>

                    <g id="circle-arcs-group"></g>

                    <g id="circle-grid-group"></g>
                </svg>
            </div>

            <div class="task-list-container">
                <h3>本日の予定一覧</h3>
                <ul id="task-list"></ul>
            </div>

            <button id="fab-add-btn" class="fab-btn" type="button">+</button>
        </section>

        <section id="view-input" class="app-view">
            <h2 class="view-title" id="input-view-title">予定の登録</h2>
            <form id="schedule-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="event-title">予定名</label>
                    <input type="text" id="event-title" required placeholder="例: ミーティング、睡眠">
                </div>

                <div class="form-row-vertical">
                    <div class="form-group">
                        <label for="event-start">開始時刻 (入力例: 0930)</label>
                        <input type="text" id="event-start" required inputmode="numeric" placeholder="09:00" maxlength="5">
                        <div class="minute-picker-label">クイック分選択 (5分刻み)</div>
                        <div id="start-min-picker" class="minute-picker-container"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="event-end">終了時刻 (入力例: 1000)</label>
                        <input type="text" id="event-end" required inputmode="numeric" placeholder="10:00" maxlength="5">
                        <div class="minute-picker-label">クイック分選択 (5分刻み)</div>
                        <div id="end-min-picker" class="minute-picker-container"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>カラー</label>
                    <div class="color-palette">
                        <button type="button" class="color-chip active" style="background-color: #d7003a;" data-color="#d7003a"></button>
                        <button type="button" class="color-chip" style="background-color: #f39800;" data-color="#f39800"></button>
                        <button type="button" class="color-chip" style="background-color: #aacf53;" data-color="#aacf53"></button>
                        <button type="button" class="color-chip" style="background-color: #59b9c6;" data-color="#59b9c6"></button>
                        <button type="button" class="color-chip" style="background-color: #706caa;" data-color="#706caa"></button>
                    </div>
                </div>

                <button type="submit" id="submit-event-btn" class="primary-btn">登録する</button>
            </form>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
