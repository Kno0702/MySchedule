<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ・スケジュール・カレンダー</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --text-color: #333;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 10px; }
    </style>
    <link rel="stylesheet" href="modal/modal.css">
</head>
<body>


<div class="modal" id="scheduleModal">
    <div class="modal-content">
        <h3 id="modalDateTitle">〇月〇日のスケジュール</h3>
        <textarea id="scheduleInput" placeholder="本日のスケジュールを入力してください..."></textarea>
        <div class="modal-btns">
            <button class="btn btn-close" id="closeBtn">閉じる</button>
            <button class="btn btn-save" id="saveBtn">保存する</button>
        </div>
    </div>
</div>

<script src="modal/modal.js"></script>

<script src="app.js"></script>
</body>
</html>
